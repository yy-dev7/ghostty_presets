"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
[](bg:yellow fg:peach)\
$git_branch\
$git_status\
$git_metrics\
[](fg:yellow bg:green)\
$c\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:green bg:lavender)\
$time\
[ ](fg:lavender)\
${custom.duration}\
$line_break\
$character"""

palette = 'pastel_powerline'

[os]
disabled = false
style = "bg:red fg:crust"

[os.symbols]
Windows = "0"
Ubuntu = "󰕈"
SUSE = "2"
Raspbian = "󰐿"
Mint = "󰓭"
Macos = "󰄛"
Manjaro = "2"
Linux = "󰌽"
Gentoo = "󰓨"
Fedora = "󰓛"
Alpine = "0"
Amazon = "0"
Android = "2"
AOSC = "1"
Arch = "󰓇"
Artix = "󰓇"
CentOS = "4"
Debian = "󰓚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"

[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user]($style)'

[directory]
style = "bg:peach fg:crust"
format = "[  $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = "9 "
"Music" = "󰝚 "
"Pictures" = "0 "
"Developer" = "󰲻 "

[git_branch]
symbol = ""
style = "bg:yellow"
format = '[[ $symbol $branch ](fg:crust bg:yellow)]($style)'

[git_status]
style = "bg:yellow"
format = '[[($all_status$ahead_behind )](fg:crust bg:yellow)]($style)'

[git_metrics]
disabled = false
added_style = "fg:crust bg:yellow"
deleted_style = "fg:crust bg:yellow"
format = '[[+$added/-$deleted ](fg:crust bg:yellow)]($style)'

[nodejs]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'
[bun]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'


[c]
symbol = " "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[rust]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[golang]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[php]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[java]
symbol = " "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[kotlin]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[haskell]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[python]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:crust bg:green)]($style)'

[docker_context]
disabled = true

[gcloud]
disabled = true

[time]
disabled = false
time_format = "%R"
style = "bg:lavender"
format = '[[  $time ](fg:crust bg:lavender)]($style)'

[line_break]
disabled = true

[character]
disabled = true
vimcmd_symbol = '[❮](bold fg:green)'
vimcmd_replace_one_symbol = '[❮](bold fg:lavender)'
vimcmd_replace_symbol = '[❮](bold fg:lavender)'
vimcmd_visual_symbol = '[❮](bold fg:yellow)'

[cmd_duration]
disabled = true

[custom.duration]
command = '''
if test $STARSHIP_CMD_DURATION_MS -ge 3600000
    set -l h (math "floor($STARSHIP_CMD_DURATION_MS / 3600000)")
    set -l m (math "floor($STARSHIP_CMD_DURATION_MS % 3600000 / 60000)")
    printf '%dh%dm' $h $m
else if test $STARSHIP_CMD_DURATION_MS -ge 60000
    set -l m (math "floor($STARSHIP_CMD_DURATION_MS / 60000)")
    set -l s (math -s2 "($STARSHIP_CMD_DURATION_MS % 60000) / 1000")
    printf '%dm%ss' $m $s
else
    printf '%ss' (math -s2 "$STARSHIP_CMD_DURATION_MS / 1000")
end
'''
when = 'test -n "$STARSHIP_CMD_DURATION_MS" -a "$STARSHIP_CMD_DURATION_MS" -gt 2000'
format = "[](fg:surface1)[ 󱑇 $output ](bg:surface1 fg:subtext0)[](fg:surface1) "
style = "bg:surface1 fg:subtext0"
shell = ["fish"]
disabled = false

